apiVersion: v1alpha1
kind: Setting
metadata:
  name: floating-particles-settings
spec:
  forms:
    - group: appearance
      label: 前台动效
      formSchema:
        - $formkit: checkbox
          name: enabled
          label: 开启前台动效
          value: true
        - $formkit: checkbox
          name: enableMobile
          label: 在移动端启用
          value: true
          help: 关闭后，手机和平板等小屏设备将不加载前台动效。
        - $formkit: select
          name: effect
          label: 粒子效果
          value: snow
          options:
            - label: 无粒子
              value: none
            - label: 雪花飘落
              value: snow
            - label: 星空漂浮
              value: stars
            - label: 气泡上升
              value: bubbles
            - label: 萤火闪烁
              value: fireflies
            - label: 樱花飘落
              value: sakura
            - label: 水波涟漪
              value: ripple
            - label: 流星雨
              value: meteors
            - label: 落叶飘落
              value: leaves
            - label: 粒子连线
              value: network
            - label: 星尘漂浮
              value: stardust
            - label: 彩纸飘落
              value: confetti
            - label: 细雨
              value: rain
            - label: 蒲公英飘散
              value: dandelion
            - label: 羽毛飘落
              value: feathers
            - label: 极光流动
              value: aurora
            - label: 星座连线
              value: constellations
            - label: 漂浮音符
              value: notes
            - label: 光斑漂浮
              value: lightspots
            - label: 萤火虫聚散
              value: firefly-cluster
        - $formkit: select
          name: cursorEffect
          label: 鼠标动效
          value: none
          options:
            - label: 关闭
              value: none
            - label: 点击礼花
              value: fireworks
            - label: 水波涟漪
              value: ripple
            - label: 拖尾光点
              value: trail
            - label: 跟随小星星
              value: stars
            - label: 光标星星跟随
              value: preset-stars
            - label: 点击爱心
              value: hearts
            - label: 鼠标光环
              value: halo
            - label: WebGL光标尾巴
              value: webgl-tail
            - label: 点击气泡
              value: click-bubbles
            - label: 点击小花
              value: click-flowers
            - label: 鼠标彩虹拖尾
              value: rainbow-trail
            - label: 鼠标磁吸粒子
              value: magnet
        - $formkit: checkbox
          name: cursorStyleEnabled
          label: 启用鼠标样式
          value: false
          help: 开启后会替换前台页面的默认鼠标光标。启用鼠标样式默认全站使用，不受下方粒子效果页面生效范围影响。
        - $formkit: select
          name: cursorStyleTemplate
          label: 鼠标光标模板
          value: pink-pig
          help: 选择插件内置的个性化鼠标光标模板。推荐使用 CUR 或 GIF 格式，PNG、WebP、SVG 等图片格式次之。
          options:
            - label: 粉色小猪
              value: pink-pig
            - label: 猫咪老师
              value: nyanko
            - label: Miku
              value: miku
            - label: 阿尼亚
              value: anya
            - label: 孤独摇滚 - 伊地知虹夏
              value: bocchi-nijika
            - label: 孤独摇滚 - 后藤独
              value: bocchi-gotou
            - label: 孤独摇滚 - 山田凉
              value: bocchi-ryo
            - label: 黑子哲也
              value: kuroko-tetsuya
        - $formkit: attachment
          name: cursorStyleImage
          label: 自定义鼠标图片
          value: ""
          help: 请上传 CUR、GIF 鼠标样式文件。
        - $formkit: select
          name: pageMode
          label: 粒子效果页面生效范围
          value: all
          help: 可以选择全站启用、仅指定路径启用，或排除指定路径。
          options:
            - label: 全站启用
              value: all
            - label: 仅指定路径启用
              value: include
            - label: 排除指定路径
              value: exclude
        - $formkit: textarea
          name: includePaths
          label: 指定启用路径
          value: ""
          help: 每行填写一个路径，例如 / 或 /about。选择“仅指定路径启用”时生效。
        - $formkit: textarea
          name: excludePaths
          label: 排除路径
          value: ""
          help: 每行填写一个路径，例如 /archives 或 /links。选择“排除指定路径”时生效。
        - $formkit: number
          name: count
          label: 粒子数量
          value: 80
          min: 20
          max: 200
          step: 10
        - $formkit: color
          name: color
          label: 动效颜色
          value: "#ffffff"
        - $formkit: number
          name: opacity
          label: 透明度
          value: 0.55
          min: 0.1
          max: 1
          step: 0.05
        - $formkit: number
          name: speed
          label: 动效速度
          value: 1
          min: 0.2
          max: 3
          step: 0.1
        - $formkit: number
          name: zIndex
          label: 动效层级
          value: 2147483000
          min: 0
          max: 2147483647
          step: 1
          help: 如果动效盖住菜单、搜索框或弹窗，可以把这个数值调低。
