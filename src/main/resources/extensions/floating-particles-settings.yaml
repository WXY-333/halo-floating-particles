apiVersion: v1alpha1
kind: Setting
metadata:
  name: floating-particles-settings
spec:
  forms:
    - group: appearance
      label: 前台动效
      formSchema:
        - $formkit: checkbox
          name: enabled
          label: 开启前台动效
          value: true
        - $formkit: select
          name: effect
          label: 粒子效果
          value: snow
          options:
            - label: 无粒子
              value: none
            - label: 雪花飘落
              value: snow
            - label: 星空漂浮
              value: stars
            - label: 气泡上升
              value: bubbles
            - label: 萤火闪烁
              value: fireflies
            - label: 樱花飘落
              value: sakura
            - label: 水波涟漪
              value: ripple
            - label: 流星雨
              value: meteors
            - label: 落叶飘落
              value: leaves
            - label: 粒子连线
              value: network
            - label: 星尘漂浮
              value: stardust
            - label: 彩纸飘落
              value: confetti
            - label: 细雨
              value: rain
        - $formkit: select
          name: cursorEffect
          label: 鼠标动效
          value: none
          options:
            - label: 关闭
              value: none
            - label: 点击礼花
              value: fireworks
            - label: 水波涟漪
              value: ripple
            - label: 拖尾光点
              value: trail
            - label: 跟随小星星
              value: stars
            - label: 光标星星跟随
              value: preset-stars
            - label: 点击爱心
              value: hearts
            - label: 鼠标光环
              value: halo
            - label: WebGL光标尾巴
              value: webgl-tail
        - $formkit: number
          name: count
          label: 粒子数量
          value: 80
          min: 20
          max: 200
          step: 10
        - $formkit: color
          name: color
          label: 动效颜色
          value: "#ffffff"
        - $formkit: number
          name: opacity
          label: 透明度
          value: 0.55
          min: 0.1
          max: 1
          step: 0.05
        - $formkit: number
          name: speed
          label: 动效速度
          value: 1
          min: 0.2
          max: 3
          step: 0.1
